<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GitHub Cloner V1{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">GitHub Cloner V1</div>
        <div class="nav-links">
            <a href="/" class="{% if page == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/search" class="{% if page == 'search' %}active{% endif %}">Search</a>
            <a href="/cart" class="{% if page == 'cart' %}active{% endif %}">Cart</a>
            <a href="/extraction" class="{% if page == 'extraction' %}active{% endif %}">Extraction</a>
            <a href="/validation" class="{% if page == 'validation' %}active{% endif %}">Validation</a>
            <a href="/failures" class="{% if page == 'failures' %}active{% endif %}">Failures</a>
            <a href="/niches" class="{% if page == 'niches' %}active{% endif %}">Niches</a>
            <a href="/schedules" class="{% if page == 'schedules' %}active{% endif %}">Schedules</a>
            <a href="/settings" class="{% if page == 'settings' %}active{% endif %}">Settings</a>
            <a href="/github" class="{% if page == 'github' %}active{% endif %}">GitHub</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/app.js"></script>
</body>
</html>
